name: Deploy OpenShorts To VM

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Validate deploy configuration
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_USER: ${{ secrets.VM_USER }}
          VM_KEY: ${{ secrets.VM_SSH_PRIVATE_KEY }}
        run: |
          set -e
          if [ -z "$VM_HOST" ]; then
            echo "Missing VM_HOST secret."
            exit 1
          fi
          if [ -z "$VM_USER" ]; then
            echo "Missing VM_USER secret."
            exit 1
          fi
          if [ -z "$VM_KEY" ]; then
            echo "Missing VM_SSH_PRIVATE_KEY secret."
            exit 1
          fi

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          script_stop: true
          command_timeout: 60m
          script: |
            set -e
            APP_DIR="$HOME/openshorts"

            if [ ! -d "$APP_DIR/.git" ]; then
              rm -rf "$APP_DIR"
              git clone https://github.com/${{ github.repository }} "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin
            git checkout main
            git reset --hard "origin/main"

            # Ensure bind-mounted runtime dirs are writable by container user.
            mkdir -p uploads output
            chmod -R 777 uploads output

            docker-compose pull || true
            docker-compose up --build -d
            docker-compose ps
